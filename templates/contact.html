<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Atelier Métriques</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 1000px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; gap: 20px; }
    }

    .info { padding: 20px; }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .badge::before {
      content: "●";
      color: #4ade80;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .info p {
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
    }
    .contact-item .icon {
      width: 36px;
      height: 36px;
      background: rgba(167, 139, 250, 0.15);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .form-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #a78bfa;
      background: rgba(167, 139, 250, 0.08);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
    }

    input::placeholder, textarea::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
      font-family: 'Space Grotesk', sans-serif;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(167, 139, 250, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .success {
      display: none;
      padding: 16px;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 12px;
      color: #4ade80;
      font-size: 14px;
      margin-top: 20px;
      text-align: center;
    }
    .success.show { display: block; }

    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      color: #fff;
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      transition: all 0.3s ease;
      z-index: 10;
    }
    .back:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(-3px);
    }
  </style>
</head>

<body>
  <a href="/" class="back">← Accueil</a>

  <div class="container">
    <div class="info">
      <div class="badge">DISPONIBLE</div>
      <h1>Contactez<br>moi</h1>
      <p>Une question sur le projet ? Une remarque ? Une opportunité ? Envoyez-moi un message, je vous réponds dans les meilleurs délais.</p>

      <div class="contact-item">
        <div class="icon">✉</div>
        <span>sabrina.mhidi@exemple.com</span>
      </div>
      <div class="contact-item">
        <div class="icon">⌖</div>
        <span>Paris, France</span>
      </div>
      <div class="contact-item">
        <div class="icon">⚡</div>
        <span>Réponse sous 24h</span>
      </div>
    </div>

    <div class="form-card">
      <div class="row">
        <div class="form-group">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" placeholder="Jane" required>
        </div>
        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" placeholder="Doe" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="vous@exemple.com" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Votre message..." required></textarea>
      </div>

      <button onclick="envoyer()">Envoyer le message →</button>

      <div class="success" id="success">
        ✓ Merci ! Votre message a bien été reçu (simulation).
      </div>
    </div>
  </div>

  <script>
    function envoyer() {
      const prenom = document.getElementById('prenom').value.trim();
      const nom = document.getElementById('nom').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!prenom || !nom || !email || !message) {
        alert('Merci de remplir tous les champs.');
        return;
      }

      const success = document.getElementById('success');
      success.classList.add('show');
      success.textContent = `✓ Merci ${prenom} ! Votre message a bien été reçu (simulation).`;

      // Réinitialiser le formulaire
      document.getElementById('prenom').value = '';
      document.getElementById('nom').value = '';
      document.getElementById('email').value = '';
      document.getElementById('message').value = '';

      setTimeout(() => success.classList.remove('show'), 5000);
    }
  </script>
</body>
</html>
