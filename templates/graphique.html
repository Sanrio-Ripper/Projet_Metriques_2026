<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Températures Paris — Chart.js</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 20px;
      color: #fff;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.85;
      font-size: 1rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      color: #333;
    }

    .chart-container {
      position: relative;
      height: 500px;
    }

    #status {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .back {
      display: inline-block;
      margin-top: 20px;
      color: #fff;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.3s;
    }
    .back:hover { opacity: 1; }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Températures horaires — Paris</h1>
      <p class="subtitle">Prévisions sur 7 jours • Source : open-meteo.com</p>
    </div>

    <div class="card">
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
      <div id="status"></div>
    </div>

    <a href="/" class="back">← Retour à l'accueil</a>
  </div>

  <script>
    async function init() {
      try {
        const res = await fetch('/paris', { headers: { 'Accept': 'application/json' } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();

        const labels = json.map(p => new Date(p.datetime));
        const data = json.map(p => Number(p.temperature_c));

        const ctx = document.getElementById('chart');
        new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: 'Température (°C)',
              data: data,
              borderColor: '#667eea',
              backgroundColor: 'rgba(102, 126, 234, 0.15)',
              borderWidth: 2,
              fill: true,
              tension: 0.4,
              pointRadius: 0,
              pointHoverRadius: 6,
              pointHoverBackgroundColor: '#764ba2',
              pointHoverBorderColor: '#fff',
              pointHoverBorderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { position: 'top', labels: { font: { size: 14 } } },
              tooltip: {
                backgroundColor: 'rgba(0, 0, 0, 0.85)',
                padding: 12,
                titleFont: { size: 13 },
                bodyFont: { size: 13 },
                callbacks: {
                  label: ctx => ` ${ctx.parsed.y} °C`
                }
              }
            },
            scales: {
              x: {
                type: 'time',
                time: { unit: 'day', tooltipFormat: 'dd/MM HH:mm', displayFormats: { day: 'dd/MM' } },
                title: { display: true, text: 'Date' },
                grid: { color: 'rgba(0,0,0,0.05)' }
              },
              y: {
                title: { display: true, text: 'Température (°C)' },
                grid: { color: 'rgba(0,0,0,0.05)' }
              }
            }
          }
        });

        document.getElementById('status').textContent = `${json.length} points chargés depuis /paris`;
      } catch (err) {
        document.getElementById('status').textContent = 'Erreur : ' + err.message;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
