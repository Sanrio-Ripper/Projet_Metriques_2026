<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Histogramme Paris — Atelier Métriques</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #fff;
      padding: 40px 20px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container { max-width: 1200px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 40px; }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .badge::before {
      content: "●";
      color: #4ade80;
      margin-right: 6px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { color: rgba(255, 255, 255, 0.6); font-size: 1rem; }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .chart-wrap {
      width: 100%;
      height: 500px;
      position: relative;
    }

    canvas {
      max-width: 100%;
    }

    #status {
      margin-top: 16px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 1px;
    }

    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      color: #fff;
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      transition: all 0.3s ease;
      z-index: 10;
    }
    .back:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>

<body>
  <a href="/" class="back">← Accueil</a>

  <div class="container">
    <div class="header">
      <div class="badge">HISTOGRAMME / MOYENNES</div>
      <h1>Températures<br>journalières Paris</h1>
      <p class="subtitle">Moyennes quotidiennes sur 7 jours • Source : open-meteo.com</p>
    </div>

    <div class="card">
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <div id="status">Chargement...</div>
    </div>
  </div>

  <script>
    window.addEventListener('load', async () => {
      const statusEl = document.getElementById('status');

      try {
        if (typeof Chart === 'undefined') {
          statusEl.textContent = 'ERREUR : Chart.js non chargé';
          return;
        }

        const res = await fetch('/paris');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();

        // Regroupement par jour
        const tempsParJour = {};
        json.forEach(p => {
          const jour = p.datetime.split('T')[0];
          if (!tempsParJour[jour]) tempsParJour[jour] = [];
          tempsParJour[jour].push(Number(p.temperature_c));
        });

        const labels = Object.keys(tempsParJour).sort();
        const moyennes = labels.map(j => {
          const arr = tempsParJour[j];
          return Number((arr.reduce((s, v) => s + v, 0) / arr.length).toFixed(1));
        });

        const labelsFormates = labels.map(d => {
          const parts = d.split('-');
          return parts[2] + '/' + parts[1];
        });

        const couleurs = moyennes.map(t => {
          if (t < 5) return 'rgba(96, 165, 250, 0.85)';
          if (t < 15) return 'rgba(74, 222, 128, 0.85)';
          if (t < 25) return 'rgba(251, 191, 36, 0.85)';
          return 'rgba(239, 68, 68, 0.85)';
        });

        const ctx = document.getElementById('chart').getContext('2d');

        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labelsFormates,
            datasets: [{
              label: 'Température moyenne (°C)',
              data: moyennes,
              backgroundColor: couleurs,
              borderWidth: 0,
              borderRadius: 12
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: 'rgba(255,255,255,0.85)', font: { size: 13 } }
              },
              tooltip: {
                backgroundColor: 'rgba(15, 12, 41, 0.95)',
                padding: 12,
                callbacks: { label: function(ctx) { return ' ' + ctx.parsed.y + ' °C'; } }
              }
            },
            scales: {
              x: {
                ticks: { color: 'rgba(255,255,255,0.6)' },
                grid: { display: false }
              },
              y: {
                ticks: {
                  color: 'rgba(255,255,255,0.6)',
                  callback: function(v) { return v + '°'; }
                },
                grid: { color: 'rgba(255,255,255,0.08)' },
                beginAtZero: false
              }
            }
          }
        });

        statusEl.textContent = labels.length + ' JOURS • BLEU < 5° < VERT < 15° < JAUNE < 25° < ROUGE';
      } catch (err) {
        statusEl.textContent = 'ERREUR : ' + err.message;
        console.error(err);
      }
    });
  </script>
</body>
</html>
