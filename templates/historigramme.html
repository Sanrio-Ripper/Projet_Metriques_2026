<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Histogramme Paris — Chart.js</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      padding: 40px 20px;
      color: #fff;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 30px; }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    .subtitle { opacity: 0.9; font-size: 1rem; }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      color: #333;
    }

    .chart-container { position: relative; height: 500px; }

    #status { margin-top: 16px; text-align: center; font-size: 14px; color: #666; }

    .back {
      display: inline-block;
      margin-top: 20px;
      color: #fff;
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.3s;
    }
    .back:hover { opacity: 1; }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Températures journalières — Paris</h1>
      <p class="subtitle">Moyennes quotidiennes sur 7 jours • Source : open-meteo.com</p>
    </div>

    <div class="card">
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
      <div id="status"></div>
    </div>

    <a href="/" class="back">← Retour à l'accueil</a>
  </div>

  <script>
    async function init() {
      try {
        const res = await fetch('/paris');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();

        // Regrouper par jour et calculer la moyenne
        const tempsParJour = {};
        json.forEach(p => {
          const jour = p.datetime.split('T')[0];
          if (!tempsParJour[jour]) tempsParJour[jour] = [];
          tempsParJour[jour].push(Number(p.temperature_c));
        });

        const labels = Object.keys(tempsParJour).sort();
        const moyennes = labels.map(j => {
          const arr = tempsParJour[j];
          return (arr.reduce((s, v) => s + v, 0) / arr.length).toFixed(1);
        });

        // Formater les labels (JJ/MM)
        const labelsFormates = labels.map(d => {
          const [y, m, day] = d.split('-');
          return `${day}/${m}`;
        });

        // Couleur dégradée selon la température
        const couleurs = moyennes.map(t => {
          const temp = Number(t);
          if (temp < 5) return 'rgba(59, 130, 246, 0.8)';   // bleu
          if (temp < 15) return 'rgba(34, 197, 94, 0.8)';   // vert
          if (temp < 25) return 'rgba(251, 191, 36, 0.8)';  // jaune
          return 'rgba(239, 68, 68, 0.8)';                  // rouge
        });

        const ctx = document.getElementById('chart');
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labelsFormates,
            datasets: [{
              label: 'Température moyenne (°C)',
              data: moyennes,
              backgroundColor: couleurs,
              borderColor: couleurs.map(c => c.replace('0.8', '1')),
              borderWidth: 2,
              borderRadius: 10,
              borderSkipped: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'top', labels: { font: { size: 14 } } },
              tooltip: {
                backgroundColor: 'rgba(0, 0, 0, 0.85)',
                padding: 12,
                callbacks: { label: ctx => ` ${ctx.parsed.y} °C` }
              }
            },
            scales: {
              x: {
                title: { display: true, text: 'Jour' },
                grid: { display: false }
              },
              y: {
                title: { display: true, text: 'Température (°C)' },
                grid: { color: 'rgba(0,0,0,0.05)' },
                beginAtZero: false
              }
            }
          }
        });

        document.getElementById('status').textContent =
          `${labels.length} jours analysés • Légende couleur : bleu < 5°C < vert < 15°C < jaune < 25°C < rouge`;
      } catch (err) {
        document.getElementById('status').textContent = 'Erreur : ' + err.message;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
